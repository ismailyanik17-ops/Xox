<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XOX: Sultanlar Divanı</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-container">
        <h1 id="main-title">XOX</h1>
        
        <div id="main-buttons" class="menu-buttons">
            <button id="training-btn" class="menu-button" style="background-color: #3498db;">Enderûn Mektebi</button>
            <button id="friend-btn" class="menu-button" style="background-color: #2ecc71;">Paşalar Düellosu</button>
            <button id="online-btn" class="menu-button" style="background-color: #fd9002;">Cihan Hakimiyeti</button>
            <button id="exit-btn" class="menu-button" style="background-color: #e74c3c; height: 40px;">ÇIKIŞ</button>
        </div>

        <div id="difficulty-container" style="display: none;">
            <h2 style="color: white; margin-bottom: 20px;">Talim Zorluğu</h2>
            <button class="menu-button" id="easy-btn" style="background-color: #3498db;">Acemi Nefer</button>
            <button class="menu-button" id="medium-btn" style="background-color: #2ecc71;">Kıdemli Çavuş</button>
            <button class="menu-button" id="hard-btn" style="background-color: #e67e22;">Sadrazam</button>
            <button id="back-to-menu" style="background:none; border:none; color:white; cursor:pointer; margin-top:20px; font-size: 1.1rem;">← Geri Dön</button>
        </div>
    </div>

    <div id="game-area" style="display: none;">
        <h2 id="status">Sıra: X</h2>
        <div class="board">
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
            <div class="cell"></div><div class="cell"></div><div class="cell"></div>
        </div>
        <div class="game-controls">
            <button id="restart-btn" style="display:none; background-color: #f1c40f;">Yeniden Başlat</button>
            <button id="back-to-difficulty-btn" class="menu-button" style="background-color: #f39c12; height: 50px; display: none;">Talim Seçimine Dön</button>
            <button id="game-back-btn" class="menu-button" style="background-color: #7f8c8d; height: 50px;">Ana Menüye Dön</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
