<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOX Pro - Sultanlar Divanı V2.6</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --ana-bg: #1a252f;
            --panel-bg: rgba(44, 62, 80, 0.95);
            --buton-bg: #3498db;
            --yazi-renk: white;
        }

        /* SENİN SEÇTİĞİN ARKA PLAN GÖRSELİ */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('Arka Plan.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--yazi-renk);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            transition: 0.5s;
        }

        /* ÜST SİMGELER */
        #ayarlar-btn, #hesap-btn, #lider-btn {
            position: fixed; top: 20px; cursor: pointer; transition: 0.3s; z-index: 100; font-size: 30px;
        }
        #ayarlar-btn { right: 20px; } #lider-btn { right: 70px; } #hesap-btn { right: 120px; }

        /* PANELLER (HESAP, LİDERLİK, AYARLAR) */
        .panel {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: var(--panel-bg); padding: 30px; border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8); z-index: 200; text-align: center;
            width: 340px; border: 2px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .profil-resmi {
            width: 80px; height: 80px; background-color: #f1c40f; border-radius: 50%;
            margin: 0 auto 10px; display: flex; justify-content: center; align-items: center;
            font-size: 40px; border: 3px solid #ecf0f1;
        }

        .isim-input {
            background: rgba(0,0,0,0.3); border: 1px solid #3498db; color: white;
            padding: 10px; border-radius: 8px; text-align: center; width: 80%;
            font-size: 18px; margin-bottom: 5px;
        }

        .istatistik-kutu {
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin: 15px 0;
        }

        /* EKRANLAR */
        .ekran { display: none; flex-direction: column; align-items: center; width: 100%; }
        .aktif { display: flex; }

        h1 { font-size: 60px; margin-bottom: 30px; color: #f1c40f; letter-spacing: 8px; text-shadow: 3px 3px 15px rgba(0,0,0,0.7); }
        
        button {
            padding: 15px; font-size: 18px; margin: 10px; cursor: pointer; border: none;
            border-radius: 12px; background-color: var(--buton-bg); color: white;
            width: 280px; font-weight: bold; transition: 0.2s;
        }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-cikis { background-color: #e74c3c; }

        /* OYUN TAHTASI */
        .oyun-tahtasi { display: grid; grid-template-columns: repeat(3, 110px); gap: 10px; margin-top: 20px; }
        .kutu {
            width: 110px; height: 110px; background-color: rgba(236, 240, 241, 0.9); border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-weight: bold; box-shadow: 0 5px 0 #bdc3c7;
        }
        
        /* İKONLAR */
        .kilic-x { color: #e74c3c; font-size: 55px; }
        .fes-o { position: relative; color: #3498db; font-size: 50px; }
        .fes-o::after { content: '🏮'; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 35px; }

        #timer-box { display: none; width: 250px; height: 12px; background: #555; margin: 15px 0; border-radius: 6px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #e67e22; transition: width 0.1s linear; }

        .lider-satir { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <audio id="ses-tik" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="ses-kazan" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="hesap-btn" onclick="paneliAc('hesap-paneli')">👤</div>
    <div id="lider-btn" onclick="paneliAc('lider-paneli')">🏆</div>
    <div id="ayarlar-btn" onclick="paneliAc('ayarlar-paneli')">⚙️</div>

    <div id="hesap-paneli" class="panel">
        <div class="profil-resmi">👤</div>
        <span id="hesap-id" style="color:#3498db; font-size:12px; font-weight:bold;">ID: #00000</span><br><br>
        <input type="text" id="isim-input" class="isim-input" oninput="isimKaydet()">
        <span id="rutbe-adi" style="display:block; margin:10px 0; color:#f1c40f; font-weight:bold; font-size:20px;">EFENDİ</span>
        <div class="istatistik-kutu">
            <div style="font-size:26px; color:#2ecc71; font-weight:bold;">Puan: <span id="puan-txt">50</span></div>
            <div style="display:flex; justify-content:space-around; margin-top:10px;">
                <div><b id="w-txt">0</b><br><small>G</small></div>
                <div><b id="d-txt">0</b><br><small>B</small></div>
                <div><b id="l-txt">0</b><br><small>M</small></div>
            </div>
        </div>
        <button onclick="panelleriKapat()" style="width:150px;">Kapat</button>
    </div>

    <div id="lider-paneli" class="panel">
        <h3>🏆 SULTANLAR DİVANI</h3>
        <div id="lider-liste" style="text-align:left; max-height:200px; overflow-y:auto;"></div>
        <button onclick="panelleriKapat()" style="width:150px; margin-top:15px;">Kapat</button>
    </div>

    <div id="ayarlar-paneli" class="panel">
        <h3>AYARLAR</h3>
        <p>Ses Durumu: <b id="ses-txt">Açık</b></p>
        <button onclick="sesToggle()" style="width:160px; padding:10px;">Sesi Aç/Kapat</button>
        <button onclick="panelleriKapat()" style="width:150px; margin-top:20px;">Kapat</button>
    </div>

    <div id="ana-menu" class="ekran aktif">
        <h1>XOX PRO</h1>
        <button onclick="ekranDegistir('ai-menu')">Yapay Zekaya Karşı</button>
        <button onclick="baslatPVP()">Arkadaşına Karşı</button>
        <button onclick="ekranDegistir('online-menu')">Online Maç</button>
    </div>

    <div id="ai-menu" class="ekran">
        <h2>Zorluk Seç</h2>
        <button onclick="baslatAI('kolay')">Kolay</button>
        <button onclick="baslatAI('normal')">Normal</button>
        <button onclick="baslatAI('zor')">Zor</button>
        <button onclick="ekranDegistir('ana-menu')">Geri</button>
    </div>

    <div id="online-menu" class="ekran">
        <h2>Süre Seç</h2>
        <button onclick="baslatOnline(5)">5 Saniye</button>
        <button onclick="baslatOnline(15)">15 Saniye</button>
        <button onclick="baslatOnline(30)">30 Saniye</button>
        <button onclick="ekranDegistir('ana-menu')">Geri</button>
    </div>

    <div id="oyun-ekrani" class="ekran">
        <h3 id="ust-bilgi" style="color: #f1c40f; margin:0;"></h3>
        <p id="mesaj-txt" style="font-size: 24px; margin:10px 0;">Sıra: ⚔️</p>
        <div id="timer-box"><div id="timer-bar"></div></div>
        <div class="oyun-tahtasi" id="board"></div>
        <button id="restart-btn" style="display: none; background-color: #27ae60;" onclick="oyunuSifirla()">Tekrar Oyna</button>
        <button onclick="menuyeDon()" style="margin-top: 20px;">Ana Menü</button>
    </div>

    <script>
        // --- AYARLAR ---
        // BURAYA RENDER LİNKİNİ YAZ (Örn: https://xox.onrender.com)
        const SERVER_URL = "https://ismailyanik17-ops.github.io/Xox/"; 

        let stats = { ad: "Oyuncu 1", puan: 50, w: 0, d: 0, l: 0, id: 0, ses: true };
        let socket;
        
        try { 
            socket = io(SERVER_URL); 
            socket.on('connect', () => console.log("✅ Sunucuya Bağlanıldı!"));
            socket.on('connect_error', () => console.log("❌ Bağlantı Yok (Offline Mod)"));
        } catch(e) { console.log("Offline Mod"); }

        function verileriYukle() {
            let data = localStorage.getItem('xox_pro_final');
            if(data) stats = JSON.parse(data);
            else stats.id = Math.floor(Math.random() * 89999) + 10000;
            document.getElementById('isim-input').value = stats.ad;
            document.getElementById('hesap-id').innerText = "ID: #" + stats.id;
            uiGuncelle();
        }
        
        function verileriKaydet() { localStorage.setItem('xox_pro_final', JSON.stringify(stats)); }
        function isimKaydet() { stats.ad = document.getElementById('isim-input').value; verileriKaydet(); }
        function sesToggle() { stats.ses = !stats.ses; uiGuncelle(); verileriKaydet(); }
        function sesPlay(id) { if(stats.ses) { let s = document.getElementById(id); s.currentTime = 0; s.play(); } }

        function uiGuncelle() {
            document.getElementById('puan-txt').innerText = Math.floor(stats.puan);
            document.getElementById('w-txt').innerText = stats.w;
            document.getElementById('d-txt').innerText = stats.d;
            document.getElementById('l-txt').innerText = stats.l;
            document.getElementById('ses-txt').innerText = stats.ses ? "Açık" : "Kapalı";
            
            let p = stats.puan;
            let r = "Efendi", i = "🏮";
            if(p > 750) { r = "Sultan"; i = "👑"; }
            else if(p > 500) r = "Veziriazam";
            else if(p > 150) r = "Ağa";
            document.getElementById('rutbe-adi').innerText = i + " " + r.toUpperCase();
        }

        // --- OYUN MANTIĞI ---
        let tahta = Array(9).fill('');
        let sira = 'X', bitti = false, mod = '', zorluk = '', onlineSira = '', odaId = '', baslangicSirasi = 'X';
        let timer, limit, kalan;

        function ekranDegistir(id) {
            document.querySelectorAll('.ekran').forEach(e => e.classList.remove('aktif'));
            document.getElementById(id).classList.add('aktif');
        }
        
        function paneliAc(id) { panelleriKapat(); document.getElementById(id).style.display='block'; if(id==='lider-paneli') liderGoster(); }
        function panelleriKapat() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); }
        function menuyeDon() { clearInterval(timer); ekranDegistir('ana-menu'); }

        function setup(txt) {
            document.getElementById('ust-bilgi').innerText = txt;
            document.getElementById('timer-box').style.display = (mod==='ONLINE'?'block':'none');
            ekranDegistir('oyun-ekrani');
            oyunuSifirla();
        }

        function baslatAI(z) { mod='AI'; zorluk=z; setup("BOT: " + z.toUpperCase()); }
        function baslatPVP() { mod='PVP'; setup("ARKADAŞINA KARŞI"); }
        function baslatOnline(s) { 
            mod='ONLINE'; limit=s; odaId = ''; 
            setup("ONLINE BEKLENİYOR..."); 
            if(socket) socket.emit('havuzaGir', {ad: stats.ad, puan: stats.puan, sure: s.toString()});
        }

        if(socket) {
            socket.on('macBasladi', (d) => {
                onlineSira = d.sembol;
                odaId = d.oda;
                baslangicSirasi = d.baslayan;
                document.getElementById('ust-bilgi').innerText = `Rakip: ${d.rakipAd}`;
                oyunuSifirla();
            });
            socket.on('rakipHamleYapti', (d) => {
                tahta[d.idx] = d.sembol;
                ciz();
                if(!kontrol()) { sira = onlineSira; msg(); baslatBar(); }
            });
        }

        function ciz() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            tahta.forEach((v, i) => {
                const d = document.createElement('div');
                d.className = 'kutu';
                if (v === 'X') d.innerHTML = '<span class="kilic-x">⚔️</span>';
                else if (v === 'O') d.innerHTML = '<span class="fes-o">O</span>';
                d.onclick = () => hamle(i);
                b.appendChild(d);
            });
        }

        function hamle(i) {
            if(bitti || tahta[i] !== '') return;
            if(mod === 'ONLINE' && sira !== onlineSira) return;
            sesPlay('ses-tik');
            tahta[i] = sira;
            ciz();
            if(mod === 'ONLINE' && socket) socket.emit('hamleYap', {idx: i, sembol: sira, oda: odaId});
            if(kontrol()) return;
            sira = (sira === 'X' ? 'O' : 'X');
            msg();
            if(mod === 'ONLINE') baslatBar();
            if(mod === 'AI' && sira === 'O') setTimeout(bot, 500);
        }

        function bot() {
            let h, r = Math.random();
            let e = (zorluk==='kolay'?0.4 : zorluk==='normal'?0.6 : 0.9);
            if(r < e) h = enIyi(); else h = boslar()[Math.floor(Math.random()*boslar().length)];
            if(h !== undefined) hamle(h);
        }

        function boslar() { return tahta.map((v,i)=>v===''?i:null).filter(v=>v!==null); }
        function enIyi() {
            let s = -Infinity, h;
            for(let i=0; i<9; i++) {
                if(tahta[i]==='') {
                    tahta[i]='O'; let sc = minimax(tahta, 0, false); tahta[i]='';
                    if(sc > s) { s=sc; h=i; }
                }
            }
            return h;
        }

        function minimax(b, d, isM) {
            let res = win(b);
            if(res !== null) return {'O':10, 'X':-10, 'Berabere':0}[res];
            if(isM) {
                let s = -Infinity;
                for(let i=0; i<9; i++) if(b[i]==='') { b[i]='O'; s=Math.max(s, minimax(b, d+1, false)); b[i]=''; }
                return s;
            } else {
                let s = Infinity;
                for(let i=0; i<9; i++) if(b[i]==='') { b[i]='X'; s=Math.min(s, minimax(b, d+1, true)); b[i]=''; }
                return s;
            }
        }

        function win(b) {
            const y = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let v of y) if(b[v[0]]!=='' && b[v[0]]===b[v[1]] && b[v[0]]===b[v[2]]) return b[v[0]];
            return b.includes('')?null:'Berabere';
        }

        function baslatBar() {
            clearInterval(timer); kalan = limit;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            timer = setInterval(() => {
                kalan -= 0.1; bar.style.width = (kalan/limit)*100 + "%";
                if(kalan <= 0) { clearInterval(timer); bittir("SÜRE BİTTİ!", sira==='X'?'O':'X'); }
            }, 100);
        }

        function kontrol() {
            let r = win(tahta);
            if(r) {
                bitti = true; clearInterval(timer);
                if(r==='X') sesPlay('ses-kazan');
                bittir(r==='Berabere'?"BERABERE!": (r==='X'?"KAZANAN: ⚔️":"KAZANAN: O🏮"), r);
                return true;
            }
            return false;
        }

        function bittir(m, r) {
            document.getElementById('mesaj-txt').innerText = m;
            document.getElementById('restart-btn').style.display = 'block';
            if(mod==='ONLINE') {
                if(r === onlineSira) stats.puan += 1; else if(r === 'Berabere') stats.puan -= 0.5; else stats.puan -= 1;
                uiGuncelle(); verileriKaydet();
                if(socket) socket.emit('updateStats', stats);
            }
        }

        function oyunuSifirla() {
            tahta = Array(9).fill(''); bitti = false;
            document.getElementById('restart-btn').style.display = 'none';
            if (mod === 'ONLINE' && odaId !== '') sira = baslangicSirasi;
            else sira = Math.random() < 0.5 ? 'X' : 'O';
            msg(); ciz();
            if (mod === 'ONLINE' && odaId !== '') baslatBar();
            else if (mod === 'AI' && sira === 'O') setTimeout(bot, 500);
        }

        function msg() { document.getElementById('mesaj-txt').innerText = "Sıra: " + (sira === 'X' ? '⚔️' : 'O🏮'); }
        
        function liderGoster() {
            const l = document.getElementById('lider-liste');
            if(socket) {
                socket.emit('getLeaderboard');
                socket.on('leaderboardData', (data) => {
                    l.innerHTML = data.map((d,i)=>`<div class="lider-satir"><span>${i+1}. ${d.username}</span><b>${Math.floor(d.puan)} P</b></div>`).join('');
                });
            }
        }

        verileriYukle();
        ciz();
    </script>
</body>
</html>
