<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOX Pro - Sultanlar Divanı V2.4</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --ana-bg: #1a252f; --panel-bg: #2c3e50; --buton-bg: #3498db; --yazi-renk: white; }
        .tema-koyu { --ana-bg: linear-gradient(rgba(26, 37, 47, 0.85), rgba(26, 37, 47, 0.95)), url('https://www.transparenttextures.com/patterns/stardust.png'); --panel-bg: #2c3e50; --buton-bg: #3498db; }
        .tema-altin { --ana-bg: linear-gradient(rgba(61, 53, 34, 0.85), rgba(61, 53, 34, 0.95)), url('https://www.transparenttextures.com/patterns/arabesque.png'); --panel-bg: #b8860b; --buton-bg: #8b4513; }
        .tema-zumrut { --ana-bg: linear-gradient(rgba(6, 46, 31, 0.85), rgba(6, 46, 31, 0.95)), url('https://www.transparenttextures.com/patterns/arab-tile.png'); --panel-bg: #216148; --buton-bg: #1e8449; }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--ana-bg); background-size: cover; color: var(--yazi-renk); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: 0.5s; }
        #ayarlar-btn, #hesap-btn, #lider-btn { position: fixed; top: 20px; cursor: pointer; z-index: 100; font-size: 30px; }
        #ayarlar-btn { right: 20px; } #lider-btn { right: 70px; } #hesap-btn { right: 120px; }
        
        .panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--panel-bg); padding: 25px; border-radius: 20px; z-index: 200; text-align: center; width: 300px; border: 2px solid rgba(255,255,255,0.1); }
        .ekran { display: none; flex-direction: column; align-items: center; width: 100%; } .aktif { display: flex; }
        h1 { font-size: 60px; margin-bottom: 20px; color: #f1c40f; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        button { padding: 15px; font-size: 18px; margin: 8px; cursor: pointer; border: none; border-radius: 12px; background-color: var(--buton-bg); color: white; width: 260px; font-weight: bold; }
        .oyun-tahtasi { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin-top: 20px; }
        .kutu { width: 100px; height: 100px; background-color: #ecf0f1; border-radius: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 0 #bdc3c7; }
        .kilic-x { color: #e74c3c; font-size: 50px; }
        .fes-o { position: relative; color: #3498db; font-size: 45px; }
        .fes-o::after { content: '🏮'; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 25px; }
        #timer-box { display: none; width: 200px; height: 10px; background: #555; margin: 10px 0; border-radius: 5px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #e67e22; }
    </style>
</head>
<body class="tema-koyu">

    <audio id="ses-tik" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="ses-kazan" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="hesap-btn" onclick="paneliAc('hesap-paneli')">👤</div>
    <div id="lider-btn" onclick="paneliAc('lider-paneli')">🏆</div>
    <div id="ayarlar-btn" onclick="paneliAc('ayarlar-paneli')">⚙️</div>

    <div id="hesap-paneli" class="panel">
        <h3>PROFİL</h3>
        <input type="text" id="isim-input" placeholder="İsim Yaz..." oninput="isimKaydet()" style="padding:10px; border-radius:5px; border:none; width:80%;">
        <p>Puan: <span id="puan-txt">50</span></p>
        <button onclick="panelleriKapat()">Kapat</button>
    </div>

    <div id="lider-paneli" class="panel">
        <h3>🏆 LİDERLER</h3>
        <div id="lider-liste"></div>
        <button onclick="panelleriKapat()">Kapat</button>
    </div>

    <div id="ayarlar-paneli" class="panel">
        <h3>AYARLAR</h3>
        <button onclick="temaSec('tema-koyu')">Koyu</button>
        <button onclick="temaSec('tema-altin')" style="background:#b8860b">Altın</button>
        <button onclick="temaSec('tema-zumrut')" style="background:#216148">Zümrüt</button>
        <button onclick="panelleriKapat()">Kapat</button>
    </div>

    <div id="ana-menu" class="ekran aktif">
        <h1>XOX PRO</h1>
        <button onclick="ekranDegistir('ai-menu')">Yapay Zekaya Karşı</button>
        <button onclick="baslatPVP()">Arkadaşına Karşı</button>
        <button onclick="ekranDegistir('online-menu')">Online Maç</button>
    </div>

    <div id="ai-menu" class="ekran">
        <h2>Zorluk Seç</h2>
        <button onclick="baslatAI('kolay')">Kolay</button>
        <button onclick="baslatAI('zor')">Zor</button>
        <button onclick="ekranDegistir('ana-menu')">Geri</button>
    </div>

    <div id="online-menu" class="ekran">
        <h2>Süre Seç</h2>
        <button onclick="baslatOnline(5)">5 Saniye</button>
        <button onclick="baslatOnline(15)">15 Saniye</button>
        <button onclick="ekranDegistir('ana-menu')">Geri</button>
    </div>

    <div id="oyun-ekrani" class="ekran">
        <h3 id="ust-bilgi" style="color:#f1c40f;"></h3>
        <p id="mesaj-txt">Sıra: ⚔️</p>
        <div id="timer-box"><div id="timer-bar"></div></div>
        <div class="oyun-tahtasi" id="board"></div>
        <button id="res-btn" style="display:none; background:#27ae60;" onclick="oyunuSifirla()">Tekrar Oyna</button>
        <button onclick="menuyeDon()">Ana Menü</button>
    </div>

    <script>
        // --- AYARLAR ---
        let stats = { ad: "Oyuncu", puan: 50, w: 0, d: 0, l: 0, ses: true, tema: 'tema-koyu' };
        let socket;
        const SERVER_URL = "https://ismailyanik17-ops.github.io/Xox/";

        try { socket = io(SERVER_URL); } catch(e) { console.log("Offline Mod"); }

        function verileriYukle() {
            let data = localStorage.getItem('xox_v2_4');
            if(data) stats = JSON.parse(data);
            document.getElementById('isim-input').value = stats.ad;
            temaSec(stats.tema);
            uiGuncelle();
        }
        function verileriKaydet() { localStorage.setItem('xox_v2_4', JSON.stringify(stats)); }
        function isimKaydet() { stats.ad = document.getElementById('isim-input').value; verileriKaydet(); }
        function temaSec(t) { document.body.className = t; stats.tema = t; verileriKaydet(); }
        function uiGuncelle() { document.getElementById('puan-txt').innerText = Math.floor(stats.puan); }
        function sesPlay(id) { let s = document.getElementById(id); s.currentTime = 0; s.play(); }

        // --- OYUN ---
        let tahta = Array(9).fill('');
        let sira = 'X', bitti = false, mod = '', zorluk = '', onlineSira = '', odaId = '', baslangicSirasi = 'X';
        let timer, limit, kalan;

        function baslatAI(z) { mod='AI'; zorluk=z; setup("BOT: " + z.toUpperCase()); }
        function baslatPVP() { mod='PVP'; setup("ARKADAŞINA KARŞI"); }
        function baslatOnline(s) { 
            mod='ONLINE'; limit=s; odaId = ''; 
            document.getElementById('ust-bilgi').innerText = "ONLINE BEKLENİYOR...";
            ekranDegistir('oyun-ekrani');
            if(socket) socket.emit('havuzaGir', {ad: stats.ad, puan: stats.puan, sure: s.toString()});
        }

        function setup(txt) {
            document.getElementById('ust-bilgi').innerText = txt;
            document.getElementById('timer-box').style.display = (mod==='ONLINE'?'block':'none');
            ekranDegistir('oyun-ekrani');
            oyunuSifirla();
        }

        if(socket) {
            socket.on('macBasladi', (d) => {
                onlineSira = d.sembol; odaId = d.oda; baslangicSirasi = d.baslayan;
                document.getElementById('ust-bilgi').innerText = `Rakip: ${d.rakipAd}`;
                oyunuSifirla();
            });
            socket.on('rakipHamleYapti', (d) => {
                tahta[d.idx] = d.sembol; ciz();
                if(!kontrol()) { sira = onlineSira; msg(); baslatBar(); }
            });
        }

        function hamle(i) {
            if(bitti || tahta[i] !== '') return;
            if(mod === 'ONLINE' && sira !== onlineSira) return;

            sesPlay('ses-tik');
            tahta[i] = sira;
            ciz();

            if(mod === 'ONLINE' && socket) socket.emit('hamleYap', {idx: i, sembol: sira, oda: odaId});

            if(kontrol()) return;
            sira = (sira === 'X' ? 'O' : 'X');
            msg();

            if(mod === 'ONLINE') baslatBar();
            if(mod === 'AI' && sira === 'O') setTimeout(bot, 500);
        }

        function bot() {
            let h, r = Math.random();
            let e = (zorluk==='kolay' ? 0.4 : 0.9);
            if(r < e) h = enIyi(); else h = boslar()[Math.floor(Math.random()*boslar().length)];
            if(h !== undefined) hamle(h);
        }

        function boslar() { return tahta.map((v,i)=>v===''?i:null).filter(v=>v!==null); }

        function enIyi() {
            let s = -Infinity, h;
            for(let i=0; i<9; i++) {
                if(tahta[i]==='') {
                    tahta[i]='O'; let sc = minimax(tahta, 0, false); tahta[i]='';
                    if(sc > s) { s=sc; h=i; }
                }
            }
            return h;
        }

        function minimax(b, d, isM) {
            let res = win(b);
            if(res !== null) return {'O':10, 'X':-10, 'Berabere':0}[res];
            if(isM) {
                let s = -Infinity;
                for(let i=0; i<9; i++) if(b[i]==='') { b[i]='O'; s=Math.max(s, minimax(b, d+1, false)); b[i]=''; }
                return s;
            } else {
                let s = Infinity;
                for(let i=0; i<9; i++) if(b[i]==='') { b[i]='X'; s=Math.min(s, minimax(b, d+1, true)); b[i]=''; }
                return s;
            }
        }

        function win(b) {
            const y = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let v of y) if(b[v[0]]!=='' && b[v[0]]===b[v[1]] && b[v[0]]===b[v[2]]) return b[v[0]];
            return b.includes('')?null:'Berabere';
        }

        function kontrol() {
            let r = win(tahta);
            if(r) {
                bitti = true; clearInterval(timer);
                if(r === 'X') sesPlay('ses-kazan');
                document.getElementById('mesaj-txt').innerText = (r === 'Berabere' ? "BERABERE!" : "KAZANAN: " + r);
                document.getElementById('res-btn').style.display = 'block';
                if(mod==='ONLINE') {
                    if(r === onlineSira) stats.puan += 1;
                    else if(r === 'Berabere') stats.puan -= 0.5;
                    else stats.puan -= 1;
                    uiGuncelle(); verileriKaydet();
                    if(socket) socket.emit('updateStats', stats);
                }
                return true;
            }
            return false;
        }

        function baslatBar() {
            clearInterval(timer); kalan = limit;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            timer = setInterval(() => {
                kalan -= 0.1; bar.style.width = (kalan/limit)*100 + "%";
                if(kalan <= 0) { clearInterval(timer); bittir("SÜRE BİTTİ!"); }
            }, 100);
        }

        function bittir(m) {
            bitti = true;
            document.getElementById('mesaj-txt').innerText = m;
            document.getElementById('res-btn').style.display = 'block';
        }

        function oyunuSifirla() {
            tahta = Array(9).fill(''); bitti = false;
            document.getElementById('res-btn').style.display = 'none';
            sira = (mod === 'ONLINE' && odaId !== '') ? baslangicSirasi : 'X';
            ciz(); msg();
            if (mod === 'ONLINE' && odaId !== '') baslatBar();
            else if (mod === 'AI' && sira === 'O') setTimeout(bot, 500);
        }

        function ciz() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            tahta.forEach((v, i) => {
                const d = document.createElement('div'); d.className = 'kutu';
                if (v === 'X') d.innerHTML = '<span class="kilic-x">⚔️</span>';
                else if (v === 'O') d.innerHTML = '<span class="fes-o">O</span>';
                d.onclick = () => hamle(i);
                b.appendChild(d);
            });
        }

        function msg() { document.getElementById('mesaj-txt').innerText = "Sıra: " + (sira === 'X' ? '⚔️' : 'O🏮'); }
        function ekranDegistir(id) { document.querySelectorAll('.ekran').forEach(e => e.classList.remove('aktif')); document.getElementById(id).classList.add('aktif'); }
        function paneliAc(id) { panelleriKapat(); document.getElementById(id).style.display='block'; if(id==='lider-paneli') liderGoster(); }
        function panelleriKapat() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); }
        function menuyeDon() { clearInterval(timer); ekranDegistir('ana-menu'); }

        function liderGoster() {
            const l = document.getElementById('lider-liste');
            if(socket) {
                socket.emit('getLeaderboard');
                socket.on('leaderboardData', (data) => {
                    l.innerHTML = data.map((d,i)=>`<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #555;"><span>${i+1}. ${d.username}</span><b>${Math.floor(d.puan)} P</b></div>`).join('');
                });
            }
        }

        verileriYukle();
        ciz();
    </script>
</body>
</html>
