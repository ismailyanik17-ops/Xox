<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOX Pro - Sultanlar Divanı V2.3</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --ana-bg: #1a252f; --panel-bg: #2c3e50; --buton-bg: #3498db; --yazi-renk: white; }
        .tema-koyu { --ana-bg: linear-gradient(rgba(26, 37, 47, 0.85), rgba(26, 37, 47, 0.95)), url('https://www.transparenttextures.com/patterns/stardust.png'); --panel-bg: #2c3e50; --buton-bg: #3498db; }
        .tema-altin { --ana-bg: linear-gradient(rgba(61, 53, 34, 0.85), rgba(61, 53, 34, 0.95)), url('https://www.transparenttextures.com/patterns/arabesque.png'); --panel-bg: #b8860b; --buton-bg: #8b4513; }
        .tema-zumrut { --ana-bg: linear-gradient(rgba(6, 46, 31, 0.85), rgba(6, 46, 31, 0.95)), url('https://www.transparenttextures.com/patterns/arab-tile.png'); --panel-bg: #216148; --buton-bg: #1e8449; }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--ana-bg); background-size: cover; background-position: center; color: var(--yazi-renk); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; transition: 0.5s; }
        #ayarlar-btn, #hesap-btn, #lider-btn { position: fixed; top: 20px; cursor: pointer; transition: 0.3s; z-index: 100; font-size: 30px; }
        #ayarlar-btn { right: 20px; } #lider-btn { right: 70px; } #hesap-btn { right: 120px; }
        
        .panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: var(--panel-bg); padding: 30px; border-radius: 20px; box-shadow: 0 0 40px rgba(0,0,0,0.7); z-index: 200; text-align: center; width: 340px; border: 2px solid rgba(255,255,255,0.1); }
        .ekran { display: none; flex-direction: column; align-items: center; width: 100%; } .aktif { display: flex; }
        h1 { font-size: 60px; margin-bottom: 30px; color: #f1c40f; letter-spacing: 8px; text-shadow: 3px 3px 15px rgba(0,0,0,0.5); }
        
        button { padding: 15px; font-size: 18px; margin: 10px; cursor: pointer; border: none; border-radius: 12px; background-color: var(--buton-bg); color: white; width: 280px; font-weight: bold; transition: 0.2s; }
        .oyun-tahtasi { display: grid; grid-template-columns: repeat(3, 110px); gap: 10px; margin-top: 20px; }
        .kutu { width: 110px; height: 110px; background-color: #ecf0f1; border-radius: 15px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 5px 0 #bdc3c7; }
        
        .kilic-x { color: #e74c3c; font-size: 55px; }
        .fes-o { position: relative; color: #3498db; font-size: 50px; }
        .fes-o::after { content: '🏮'; position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 35px; }

        #timer-box { display: none; width: 250px; height: 12px; background: #555; margin: 15px 0; border-radius: 6px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #e67e22; }
    </style>
</head>
<body class="tema-koyu">

    <audio id="ses-tik" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="ses-kazan" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <div id="hesap-btn" onclick="paneliAc('hesap-paneli')">👤</div>
    <div id="lider-btn" onclick="paneliAc('lider-paneli')">🏆</div>
    <div id="ayarlar-btn" onclick="paneliAc('ayarlar-paneli')">⚙️</div>

    <div id="ana-menu" class="ekran aktif">
        <h1>XOX PRO</h1>
        <button onclick="ekranDegistir('ai-menu')">Yapay Zekaya Karşı</button>
        <button onclick="baslatPVP()">Arkadaşına Karşı</button>
        <button onclick="ekranDegistir('online-menu')">Online Maç</button>
    </div>

    <div id="online-menu" class="ekran">
        <h2>Süre Seç</h2>
        <button onclick="baslatOnline(5)">5 Saniye</button>
        <button onclick="baslatOnline(15)">15 Saniye</button>
        <button onclick="ekranDegistir('ana-menu')">Geri</button>
    </div>

    <div id="oyun-ekrani" class="ekran">
        <h3 id="ust-bilgi" style="color: #f1c40f;"></h3>
        <p id="mesaj-txt" style="font-size: 24px;">Sıra: ⚔️</p>
        <div id="timer-box"><div id="timer-bar"></div></div>
        <div class="oyun-tahtasi" id="board"></div>
        <button onclick="menuyeDon()">Ana Menü</button>
    </div>

    <script>
        let stats = { ad: "Oyuncu 1", puan: 50, w: 0, d: 0, l: 0, id: 0, ses: true, tema: 'tema-koyu' };
        let socket;
        
        // --- KRİTİK DEĞİŞİKLİK ---
        // Aşağıdaki linki Render'dan aldığınız linkle değiştirin!
        const SERVER_URL = "https://ismailyanik17-ops.github.io/Xox/"; 

        try { 
            socket = io(SERVER_URL); 
            console.log("Sunucuya bağlanmaya çalışılıyor...");
        } catch(e) { console.log("Bağlantı hatası."); }

        let tahta = Array(9).fill('');
        let sira = 'X', bitti = false, mod = '', onlineSira = '', odaId = '', baslangicSirasi = 'X';
        let timer, limit, kalan;

        function baslatOnline(s) { 
            mod='ONLINE'; limit=s; odaId = ''; 
            document.getElementById('ust-bilgi').innerText = "ONLINE BEKLENİYOR...";
            ekranDegistir('oyun-ekrani');
            if(socket) socket.emit('havuzaGir', {ad: stats.ad, puan: stats.puan, sure: s.toString()});
        }

        if(socket) {
            socket.on('macBasladi', (d) => {
                onlineSira = d.sembol;
                odaId = d.oda;
                baslangicSirasi = d.baslayan;
                document.getElementById('ust-bilgi').innerText = `Rakip: ${d.rakipAd}`;
                oyunuSifirla();
            });
            socket.on('rakipHamleYapti', (d) => {
                tahta[d.idx] = d.sembol;
                ciz();
                if(!kontrol()) { sira = onlineSira; msg(); baslatBar(); }
            });
        }

        function hamle(i) {
            if(bitti || tahta[i] !== '') return;
            if(mod === 'ONLINE' && sira !== onlineSira) return;

            tahta[i] = sira;
            ciz();
            if(mod === 'ONLINE' && socket) socket.emit('hamleYap', {idx: i, sembol: sira, oda: odaId});

            if(kontrol()) return;
            sira = (sira === 'X' ? 'O' : 'X');
            msg();
            if(mod === 'ONLINE') baslatBar();
        }

        function ciz() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            tahta.forEach((v, i) => {
                const d = document.createElement('div');
                d.className = 'kutu';
                if (v === 'X') d.innerHTML = '<span class="kilic-x">⚔️</span>';
                else if (v === 'O') d.innerHTML = '<span class="fes-o">O</span>';
                d.onclick = () => hamle(i);
                b.appendChild(d);
            });
        }

        function oyunuSifirla() {
            tahta = Array(9).fill(''); bitti = false;
            sira = (mod === 'ONLINE' && odaId !== '') ? baslangicSirasi : 'X';
            ciz(); msg();
            if (mod === 'ONLINE' && odaId !== '') baslatBar();
        }

        function msg() { 
            let g = sira === 'X' ? '⚔️' : 'O🏮';
            document.getElementById('mesaj-txt').innerText = "Sıra: " + g; 
        }

        function ekranDegistir(id) {
            document.querySelectorAll('.ekran').forEach(e => e.classList.remove('aktif'));
            document.getElementById(id).classList.add('aktif');
        }

        function paneliAc(id) { document.getElementById(id).style.display='block'; }
        function panelleriKapat() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); }
        function menuyeDon() { clearInterval(timer); ekranDegistir('ana-menu'); }

        // Stat ve kontrol fonksiyonları önceki sürümlerle aynı kalacak...
    </script>
</body>
</html>
